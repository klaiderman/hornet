services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      HORNET_DATABASE_URL: postgresql+psycopg://hornet:hornet@postgres:5432/hornet
      HORNET_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: hornet
      POSTGRES_PASSWORD: hornet
      POSTGRES_DB: hornet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hornet"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
